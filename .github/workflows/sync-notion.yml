name: Sync P-CAB data from Notion

on:
  schedule:
    # UTC 기준. 한국시간(KST=UTC+9) 매주 월/수/금 오전 9시에 실행되도록
    # UTC 자정(00:00)으로 설정 (KST 09:00)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼도 사용 가능

permissions:
  contents: write

concurrency:
  group: pcab-notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Notion sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: 'fe11fe2ad0c54c5994149a29e07b572d'
          PAGE_ID: '39f9a76bfca681c6ad85d4043bf1a902'
          INDEX_HTML: 'index.html'
        run: python scripts/sync_notion.py

      - name: Commit and push if changed
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: 'fe11fe2ad0c54c5994149a29e07b572d'
          PAGE_ID: '39f9a76bfca681c6ad85d4043bf1a902'
          INDEX_HTML: 'index.html'
        run: |
          git config user.name "pcab-sync-bot"
          git config user.email "actions@users.noreply.github.com"

          if git diff --quiet -- index.html; then
            echo "변경 사항 없음 - 커밋 생략"
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "=== push 시도 $attempt/3 ==="
            git add index.html
            git commit -m "chore: sync P-CAB evidence from Notion ($(date -u +'%Y-%m-%d %H:%M UTC'))" || true

            if git push; then
              echo "push 성공"
              exit 0
            fi

            echo "push 실패 - 최신 원격 내용을 기준으로 재정렬 후 재생성합니다."
            git fetch origin main
            git reset --hard origin/main
            python scripts/sync_notion.py
          done

          echo "3회 시도 후에도 push 실패"
          exit 1
