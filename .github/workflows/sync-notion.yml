name: Sync P-CAB data from Notion

on:
  schedule:
    # UTC 기준. 한국시간(KST=UTC+9) 매주 월/수/금 오전 9시에 실행되도록
    # UTC 자정(00:00)으로 설정 (KST 09:00)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼도 사용 가능

permissions:
  contents: write

concurrency:
  group: pcab-notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Notion sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: 'fe11fe2ad0c54c5994149a29e07b572d'
          INDEX_HTML: 'index.html'
        run: python scripts/sync_notion.py

      - name: Commit and push if changed
        run: |
          git config user.name "pcab-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- index.html; then
            echo "변경 사항 없음 - 커밋 생략"
          else
            git add index.html
            git commit -m "chore: sync P-CAB evidence from Notion ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push
          fi
